openapi: 3.0.1
info:
  title: Sil API
  description: Servizio sil per Piattaforma Unitaria
  version: '1.0'
servers:
  - url: https://api.uat.p4pa.pagopa.it/pu/sil
paths:
  '/organization/{orgFiscalCode}/send-notification':
    post:
      tags:
        - SendNotification
      summary: Create notification
      description: Create initial notification
      operationId: createSendNotification
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNotificationRequest'
            example:
              organizationId: 0
              paProtocolNumber: string
              recipients:
                - recipientType: PF
                  taxId: string
                  denomination: string
                  physicalAddress:
                    address: string
                    zip: string
                    municipality: string
                    province: string
                  digitalDomicile:
                    type: PEC
                    address: string
                  payments:
                    - pagoPa:
                        noticeCode: string
                        creditorTaxId: string
                        applyCost: true
                        attachment:
                          digest: string
                          contentType: string
                          fileName: string
                      f24:
                        title: string
                        applyCost: true
                        metadataAttachment:
                          digest: string
                          contentType: string
                          fileName: string
              documents:
                - digest: string
                  contentType: string
                  fileName: string
              notificationFeePolicy: FLAT_RATE
              physicalCommunicationType: AR_REGISTERED_LETTER
              senderDenomination: string
              senderTaxId: string
              amount: 0
              paymentExpirationDate: string
              taxonomyCode: string
              paFee: 0
              vat: 0
              pagoPaIntMode: SYNC
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNotificationResponse'
              example:
                sendNotificationId: string
                preloadUrl: string
                status: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNotificationResponse'
              example:
                sendNotificationId: string
                preloadUrl: string
                status: string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNotificationResponse'
              example:
                sendNotificationId: string
                preloadUrl: string
                status: string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNotificationResponse'
              example:
                sendNotificationId: string
                preloadUrl: string
                status: string
  '/organization/{orgFiscalCode}/send-notification/{sendNotificationId}':
    get:
      tags:
        - SendNotification
      summary: get send notification
      description: get send notification
      operationId: getSendNotification
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
              example:
                sendNotificationId: string
                organizationId: 0
                iun: string
                payments:
                  - debtPositionId: 0
                    navList:
                      - string
                    notificationDate: string
                status: WAITING_FILE
                errors:
                  - string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
              example:
                sendNotificationId: string
                organizationId: 0
                iun: string
                payments:
                  - debtPositionId: 0
                    navList:
                      - string
                    notificationDate: string
                status: WAITING_FILE
                errors:
                  - string
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
              example:
                sendNotificationId: string
                organizationId: 0
                iun: string
                payments:
                  - debtPositionId: 0
                    navList:
                      - string
                    notificationDate: string
                status: WAITING_FILE
                errors:
                  - string
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
              example:
                sendNotificationId: string
                organizationId: 0
                iun: string
                payments:
                  - debtPositionId: 0
                    navList:
                      - string
                    notificationDate: string
                status: WAITING_FILE
                errors:
                  - string
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SendNotificationDTO'
              example:
                sendNotificationId: string
                organizationId: 0
                iun: string
                payments:
                  - debtPositionId: 0
                    navList:
                      - string
                    notificationDate: string
                status: WAITING_FILE
                errors:
                  - string
    delete:
      tags:
        - SendNotification
      summary: Delete notification
      description: Delete notification
      operationId: deleteSendNotification
      parameters:
        - name: orgFiscalCode
          in: path
          required: true
          schema:
            type: string
        - name: sendNotificationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '400':
          description: Invalid request
        '403':
          description: Forbidden
        '500':
          description: Internal server error
  '/organization/{orgFiscalCode}/debt-position/{iud}':
    put:
      tags:
        - DebtPosition
      summary: manage a single debt position
      description: 'Service to manage a single debt position, allowing to add, modify or delete one or more installments. '
      operationId: manageDebtPositionInstallments
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
        - name: iud
          in: path
          description: The IUD of any installment of the debtPosition/paymentOption that will be managed by this operation
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ManageDebtPositionDTO'
            example:
              debtPositionDescription: string
              validityDate: string
              paymentOptionDescription: string
              installments:
                - action: I
                  installment:
                    installmentId: 0
                    paymentOptionId: 0
                    status: TO_SYNC
                    syncStatus:
                      syncStatusFrom: TO_SYNC
                      syncStatusTo: TO_SYNC
                      syncError: string
                    iupdPagopa: string
                    generateNotice: true
                    iud: string
                    iuv: string
                    iur: string
                    iuf: string
                    nav: string
                    iun: string
                    dueDate: string
                    switchToExpired: true
                    notificationFeeCents: 0
                    amountCents: 0
                    remittanceInformation: string
                    balance: string
                    legacyPaymentMetadata: string
                    debtor:
                      entityType: F
                      fiscalCode: string
                      fullName: string
                      address: string
                      civic: string
                      postalCode: string
                      location: string
                      province: string
                      nation: string
                      email: string
                    transfers:
                      - transferId: 0
                        installmentId: 0
                        orgFiscalCode: string
                        orgName: string
                        amountCents: 0
                        remittanceInformation: string
                        stampType: string
                        stampHashDocument: string
                        stampProvincialResidence: string
                        iban: string
                        postalIban: string
                        category: string
                        transferIndex: 0
                        creationDate: string
                        updateDate: string
                        updateOperatorExternalId: string
                        updateTraceId: string
                        mbdAttachment: string
                    notificationDate: string
                    ingestionFlowFileId: 0
                    ingestionFlowFileLineNumber: 0
                    ingestionFlowFileAction: I
                    sourceFlowName: string
                    receiptId: 0
                    creationDate: string
                    updateDate: string
                    updateOperatorExternalId: string
                    updateTraceId: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DebtPositionDTO'
              example:
                debtPositionId: 0
                iupdOrg: string
                description: string
                status: TO_SYNC
                debtPositionOrigin: ORDINARY
                organizationId: 0
                debtPositionTypeOrgId: 0
                validityDate: string
                flagIuvVolatile: true
                multiDebtor: true
                flagPuPagoPaPayment: true
                creationDate: string
                updateDate: string
                updateOperatorExternalId: string
                updateTraceId: string
                paymentOptions:
                  - paymentOptionId: 0
                    debtPositionId: 0
                    totalAmountCents: 0
                    status: TO_SYNC
                    description: string
                    paymentOptionType: SINGLE_INSTALLMENT
                    paymentOptionIndex: 0
                    creationDate: string
                    updateDate: string
                    updateOperatorExternalId: string
                    updateTraceId: string
                    installments:
                      - installmentId: 0
                        paymentOptionId: 0
                        status: TO_SYNC
                        syncStatus:
                          syncStatusFrom: TO_SYNC
                          syncStatusTo: TO_SYNC
                          syncError: string
                        iupdPagopa: string
                        generateNotice: true
                        iud: string
                        iuv: string
                        iur: string
                        iuf: string
                        nav: string
                        iun: string
                        dueDate: string
                        switchToExpired: true
                        notificationFeeCents: 0
                        amountCents: 0
                        remittanceInformation: string
                        balance: string
                        legacyPaymentMetadata: string
                        debtor:
                          entityType: F
                          fiscalCode: string
                          fullName: string
                          address: string
                          civic: string
                          postalCode: string
                          location: string
                          province: string
                          nation: string
                          email: string
                        transfers:
                          - transferId: 0
                            installmentId: 0
                            orgFiscalCode: string
                            orgName: string
                            amountCents: 0
                            remittanceInformation: string
                            stampType: string
                            stampHashDocument: string
                            stampProvincialResidence: string
                            iban: string
                            postalIban: string
                            category: string
                            transferIndex: 0
                            creationDate: string
                            updateDate: string
                            updateOperatorExternalId: string
                            updateTraceId: string
                            mbdAttachment: string
                        notificationDate: string
                        ingestionFlowFileId: 0
                        ingestionFlowFileLineNumber: 0
                        ingestionFlowFileAction: I
                        sourceFlowName: string
                        receiptId: 0
                        creationDate: string
                        updateDate: string
                        updateOperatorExternalId: string
                        updateTraceId: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
        '404':
          description: Not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
  '/organization/{orgFiscalCode}/payment':
    post:
      tags:
        - Payment
      summary: request an instant payment operation
      description: 'Request an instant payment operation, passing in input payment data, and receiving in output the url to trigger the payment operation. '
      operationId: requestInstantPayment
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InstantPaymentRequest'
            example:
              payments:
                - debtPositionTypeOrgCode: string
                  iud: string
                  notificationFeeCents: 0
                  totalAmountCents: 0
                  description: string
                  balance: string
                  debtor:
                    entityType: F
                    fiscalCode: string
                    fullName: string
                    address: string
                    civic: string
                    postalCode: string
                    location: string
                    province: string
                    nation: string
                    email: string
                  transfers:
                    - transferId: 0
                      installmentId: 0
                      orgFiscalCode: string
                      orgName: string
                      amountCents: 0
                      remittanceInformation: string
                      stampType: string
                      stampHashDocument: string
                      stampProvincialResidence: string
                      iban: string
                      postalIban: string
                      category: string
                      transferIndex: 0
                      creationDate: string
                      updateDate: string
                      updateOperatorExternalId: string
                      updateTraceId: string
                      mbdAttachment: string
              callbackUrl: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentResponse'
              example:
                triggerPaymentUrl: string
                downloadNoticeUrl: string
                paymentId: string
                outcome: OK
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
  '/organization/{orgFiscalCode}/import':
    post:
      tags:
        - Import
      summary: request a massive import operation
      description: 'Service to request a massive import operation. The upload of the file is done invoking the url returned by this service. '
      operationId: massiveImportRequest
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ImportFileRequestDTO'
            example:
              importFileType: RECEIPT
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportFileResponseDTO'
              example:
                importId: string
                uploadUrl: string
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
  '/organization/{orgFiscalCode}/export/paid':
    post:
      tags:
        - Export
      summary: request a massive export operation
      description: Service to request a massive export operation.
      operationId: massivePaidExportRequest
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaidExportRequestDTO'
            example:
              orgFiscalCode: string
              fileVersion: string
              exportFilters:
                paymentDateTime:
                  from: string
                  to: string
                installmentUpdateDateTime:
                  from: string
                  to: string
                debtPositionTypeOrgCode: string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportFileResponseDTO'
              example:
                exportId: string
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
  '/organization/{orgFiscalCode}/export/classifications':
    post:
      tags:
        - Export
      summary: request a massive export operation
      description: Service to request a massive export operation.
      operationId: massiveClassificationsExportRequest
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClassificationsExportRequestDTO'
            example:
              orgFiscalCode: string
              fileVersion: string
              exportFilters:
                iuf: string
                iud: string
                iuv:
                  - string
                iur:
                  - string
                label:
                  - DOPPI
                lastClassificationDate:
                  from: string
                  to: string
                payDate:
                  from: string
                  to: string
                paymentDate:
                  from: string
                  to: string
                regulationDate:
                  from: string
                  to: string
                billDate:
                  from: string
                  to: string
                regionValueDate:
                  from: string
                  to: string
                regulationUniqueIdentifier: string
                accountRegistryCode: string
                billAmountCents: 0
                remittanceInformation: string
                pspCompanyName: string
                pspLastName: string
                debtPositionTypeOrgCodes:
                  - string
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExportFileResponseDTO'
              example:
                exportId: string
        '500':
          description: Server Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PuSilErrorDTO'
              example:
                code: NOT_FOUND
                message: string
