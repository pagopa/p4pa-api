        - Payment
      summary: handle the payment of an already existing payment notice
      description: 'Service to request the start of online payment of a payment notice, or alternatively the download of notice as PDF file; in input accepts the notice number, and if the notice is payable, returns the url to trigger the payment operation and the url to download the PDF notice file; if the notice is not payable, returns the reason of error. '
      operationId: requestNoticePayment
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
        - name: nav
          in: path
          description: the notice number of the notice to pay
          required: true
          schema:
            pattern: '^\d{18}$'
            type: string
        - name: callbackUrl
          in: query
          description: 'If the nav is payable, this parameter is used to specify the url to redirect the navigation flow to, after completing the payment operation. If not set, a generic PU page will be used. The parameters paymentId and outcome (OK/KO) will be added to query string of url. '
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
