          type: string
        amountCents:
          type: integer
          format: int64
        remittanceInformation:
          type: string
        stampType:
          type: string
        stampHashDocument:
          type: string
        stampProvincialResidence:
          type: string
        iban:
          type: string
        postalIban:
          type: string
        category:
          type: string
        transferIndex:
          type: integer
          format: int32
        creationDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        updateOperatorExternalId:
          type: string
