components:
  schemas:
    Action:
      enum:
        - I
        - M
        - A
      type: string
    DebtPositionDTO:
      required:
        - debtPositionOrigin
        - debtPositionTypeOrgId
        - flagPuPagoPaPayment
        - organizationId
        - paymentOptions
      type: object
      properties:
        debtPositionId:
          type: integer
          format: int64
        iupdOrg:
          type: string
        description:
          type: string
        status:
          $ref: '#/components/schemas/DebtPositionStatus'
        debtPositionOrigin:
          $ref: '#/components/schemas/DebtPositionOrigin'
        organizationId:
          type: integer
          format: int64
        debtPositionTypeOrgId:
          type: integer
          format: int64
        validityDate:
          type: string
          format: date
        flagIuvVolatile:
          type: boolean
        multiDebtor:
          type: boolean
        flagPuPagoPaPayment:
          type: boolean
        creationDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        updateOperatorExternalId:
          type: string
        updateTraceId:
          type: string
        paymentOptions:
          type: array
          items:
            $ref: '#/components/schemas/PaymentOptionDTO'
    DebtPositionOrigin:
      enum:
        - ORDINARY
        - ORDINARY_SIL
        - SPONTANEOUS
        - SPONTANEOUS_SIL
        - SPONTANEOUS_MIXED
        - SECONDARY_ORG
        - RECEIPT_FILE
        - RECEIPT_PAGOPA
        - REPORTING_PAGOPA
      type: string
    DebtPositionStatus:
      enum:
        - TO_SYNC
        - REPORTED
        - PAID
        - PARTIALLY_PAID
        - CANCELLED
        - EXPIRED
        - UNPAID
        - DRAFT
      type: string
    InstallmentDTO:
      required:
        - amountCents
        - debtor
        - remittanceInformation
      type: object
      properties:
        installmentId:
          type: integer
          format: int64
        paymentOptionId:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/InstallmentStatus'
        syncStatus:
          $ref: '#/components/schemas/InstallmentSyncStatus'
        iupdPagopa:
          type: string
        generateNotice:
          type: boolean
        iud:
          type: string
        iuv:
          type: string
        iur:
          type: string
        iuf:
          type: string
        nav:
          type: string
        iun:
          type: string
        dueDate:
          type: string
          format: date
        switchToExpired:
          type: boolean
        notificationFeeCents:
          type: integer
          format: int64
        amountCents:
          type: integer
          format: int64
        remittanceInformation:
          type: string
        balance:
          type: string
        legacyPaymentMetadata:
          type: string
        debtor:
          $ref: '#/components/schemas/PersonDTO'
        transfers:
          type: array
          items:
            $ref: '#/components/schemas/TransferDTO'
        notificationDate:
          type: string
          format: date-time
        ingestionFlowFileId:
          type: integer
          format: int64
        ingestionFlowFileLineNumber:
          type: integer
          format: int64
        ingestionFlowFileAction:
          $ref: '#/components/schemas/Action'
        sourceFlowName:
          type: string
        receiptId:
          type: integer
          format: int64
        creationDate:
          type: string
          format: date-time
        updateDate:
          type: string
          format: date-time
        updateOperatorExternalId:
          type: string
        updateTraceId:
          type: string
    InstallmentStatus:
      enum:
        - TO_SYNC
        - REPORTED
        - PAID
        - CANCELLED
        - INVALID
        - EXPIRED
        - UNPAID
        - UNPAYABLE
        - DRAFT
      type: string
    InstallmentSyncStatus:
      required:
        - syncStatusFrom
        - syncStatusTo
      type: object
      properties:
        syncStatusFrom:
          $ref: '#/components/schemas/InstallmentStatus'
        syncStatusTo:
          $ref: '#/components/schemas/InstallmentStatus'
        syncError:
          type: string
    PaymentOptionDTO:
      required:
        - installments
        - paymentOptionType
        - totalAmountCents
      type: object
      properties:
        paymentOptionId:
          type: integer
          format: int64
        debtPositionId:
          type: integer
          format: int64
        totalAmountCents:
          type: integer
          format: int64
        status:
          $ref: '#/components/schemas/PaymentOptionStatus'
        description:
          type: string
        paymentOptionType:
          $ref: '#/components/schemas/PaymentOptionTypeEnum'
        paymentOptionIndex:
          type: integer
          format: int32
