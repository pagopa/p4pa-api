  '/organization/{orgFiscalCode}/printpaymentnotice/{iuv}':
    get:
      tags:
        - PrintPaymentNotice
      summary: Print payment notice as PDF
      description: Print payment notice as PDF
      operationId: generateNotice
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
        - name: iuv
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Ok
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              examples:
                default:
                  value: 
        '400':
          description: Invalid request
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              examples:
                default:
                  value: 
        '404':
          description: Notification not found
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              examples:
                default:
                  value: 
        '500':
          description: Internal server error
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
              examples:
                default:
                  value: 
  '/organization/{orgFiscalCode}/payment/{idType}/{id}':
    get:
      tags:
        - Payment
      summary: request processing status of payment operation
      description: 'Service to request the processing status of payment operation and the url to download output files (where applicable, based on processing status and export type). '
      operationId: paymentStatus
      parameters:
        - name: orgFiscalCode
          in: path
          description: the fiscal code of the organization
          required: true
          schema:
            pattern: '^\d{11}$'
            type: string
        - name: idType
          in: path
          description: the type of identifier used to identify the payment operation
          required: true
          schema:
            $ref: '#/components/schemas/QueryPaymentStatusType'
        - name: id
          in: path
          description: the identifier used to identify the payment
          required: true
          schema:
            type: string
        - name: withReceiptBytes
          in: query
          description: 'if true, the response will contain the receipt bytes'
          schema:
            type: boolean
      responses:
        '200':
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentStatusResponseDTO'
              example:
                paymentId: string
                status: TO_SYNC
                receipt:
                  paymentReceiptId: string
                  noticeNumber: string
                  paymentNote: string
